<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NSU Device Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/src/img/favicon.png">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body color-theme="light" class="setup-body">
    <button class="dark-light-toggle" aria-hidden="true">
      <div class="icon30 sun">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#222222"><path d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
      </div>
      <div class="icon30 moon">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
      </div>
    </button>

    <main class="setup-card">
        <h1 class="setup-title">NSU Device Setup</h1>

        <div class="setup-inline-row">
            <div class="setup-inline-field">
                <label for="serialPort">Arduino Port</label>
                <select id="serialPort"></select>
            </div>
            <div class="setup-inline-field">
                <label for="esp32Ip">ESP32-CAM IP</label>
                <input
                    id="esp32Ip"
                    type="text"
                    inputmode="decimal"
                    placeholder="형식 : 0.0.0.0"
                    autocomplete="off"
                >
            </div>
        </div>

        <label for="cam1">Cam 1</label>
        <select id="cam1"></select>

        <label for="cam2">Cam 2</label>
        <select id="cam2"></select>

        <label for="cam3">Cam 3</label>
        <select id="cam3"></select>

        <div class="preview-grid">
            <section class="preview-card">
                <h3>Cam 1 Preview</h3>
                <div class="preview-frame">
                    <img id="cam1Preview" alt="Cam 1 preview">
                    <p id="cam1PreviewMsg" class="preview-msg">카메라를 선택하세요.</p>
                </div>
            </section>

            <section class="preview-card">
                <h3>Cam 2 Preview</h3>
                <div class="preview-frame">
                    <img id="cam2Preview" alt="Cam 2 preview">
                    <p id="cam2PreviewMsg" class="preview-msg">카메라를 선택하세요.</p>
                </div>
            </section>

            <section class="preview-card">
                <h3>Cam 3 Preview</h3>
                <div class="preview-frame">
                    <img id="cam3Preview" alt="Cam 3 preview">
                    <p id="cam3PreviewMsg" class="preview-msg">카메라를 선택하세요.</p>
                </div>
            </section>

            <section class="preview-card">
                <h3>ESP32-CAM Preview</h3>
                <div class="preview-frame">
                    <img id="esp32Preview" alt="ESP32-CAM preview">
                    <p id="esp32PreviewMsg" class="preview-msg">ESP32 IP를 입력하세요.</p>
                </div>
            </section>
        </div>

        <div class="setup-actions">
            <p id="setupMessage" class="setup-message"></p>
            <button id="refreshBtn" type="button">장치 새로고침</button>
            <button id="applyBtn" type="button">확인(적용)</button>
        </div>
    </main>

    <script src="/src/theme_handler.js"></script>
    <script src="/src/setup.js"></script>
</body>
</html>
